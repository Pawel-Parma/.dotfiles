TMUX_PLUGINS_PATH="$HOME/.tmux/plugins"
TMUX_RESSURECT_DIR="$HOME/.tmux/resurrect"
TMUX_CONF_PATH="$HOME/.config/tmux"
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$TMUX_PLUGINS_PATH"

set -s default-terminal 'tmux-256color'
set -as terminal-features ",xterm-256color:RGB"

set -g escape-time 0 # 150
set -g repeat-time 500
set -g display-time 1000
set -g status-interval 5
set -g focus-events on
set -g mouse on

setw -g pane-base-index 1
set -g base-index 1
set -g renumber-windows on  
set -g history-limit 50000

setw -g mode-keys vi

set -g prefix C-Space
bind C-Space send-prefix
unbind C-b

bind r source-file "$TMUX_CONF_PATH/tmux.conf" \; display-message "Tmux config reloaded!"
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind '\' split-window -h
bind - split-window -v
bind q kill-pane
bind k kill-window
unbind l
unbind '"'
unbind %

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi 'Y' set -s set-clipboard on \; send-keys -X copy-pipe-and-cancel "tmux load-buffer -w -" \; set -s set-clipboard off
bind v copy-mode
bind-key / copy-mode \; send-key ?

bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind C-f display-popup -h 15 -y "#{e|/:#{e|*:45,#{client_height}},100}" -B -E "$TMUX_CONF_PATH/session-ts.sh"
bind C-t display-popup -h 15 -y "#{e|/:#{e|*:45,#{client_height}},100}" -B -E "$TMUX_CONF_PATH/session-tp.sh"

# plugins
# TODO: see https://github.com/catppuccin/tmux/issues/409 and https://github.com/catppuccin/tmux/pull/577
#       see https://github.com/catppuccin/tmux/issues/582 and https://github.com/catppuccin/tmux/pull/584
# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'Pawel-Parma/catppuccin-tmux#myplussepfix'
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_popup_style "bg=default,fg=#{@thm_fg}"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_number_color "#{@thm_lavender}"
set -g @catppuccin_date_time_text " %H:%M"
set -g status-left "" 
set -g status-right "#{E:@catppuccin_status_date_time}#{E:@catppuccin_status_session}" 

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-dir $TMUX_RESSURECT_DIR
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '7'

set -g @plugin 'tmux-plugins/tpm'
if "test ! -d $TMUX_PLUGINS_PATH/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $TMUX_PLUGINS_PATH/tpm && $TMUX_PLUGINS_PATH/tpm/bin/install_plugins'"
run "$TMUX_PLUGINS_PATH/tpm/tpm"

