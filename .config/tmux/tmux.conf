set -s default-terminal 'tmux-256color'
set -g escape-time 0 # 150
set -g repeat-time 500

set -g renumber-windows on  
set-window-option -g pane-base-index 1
set -g base-index 1
set -g pane-base-index 1

set -g history-limit 50000
set-option -g display-time 1500
set -g status-interval 5
setw -g mode-keys vi
bind-key C-h select-pane -L
bind-key C-j select-pane -D
bind-key C-k select-pane -U
bind-key C-l select-pane -R
bind '\' split-window -h
bind - split-window -v
bind-key q kill-pane
bind k kill-window
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind Escape copy-mode
bind-key / copy-mode \; send-key ?
# set-option -g status-keys vi # TODO:
unbind l 
unbind '"'
unbind %
set -g mouse on
set-option -g focus-events on
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind r source-file $HOME/.config/tmux/tmux.conf \; display-message "tmux config reloaded!"
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
unbind -n C-d

# plugins
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor "mocha"
# set -g @catppuccin_status_background "none" # TODO: https://github.com/catppuccin/tmux/issues/409
set -g @catppuccin_window_current_left_separator "#[bg=default,fg=#{@thm_surface_1}]#[bg=default,fg=#{@thm_surface_1}]"
set -g @catppuccin_window_current_right_separator "#[bg=default,fg=#{@thm_mauve}]#[bg=default,fg=#{@thm_mauve}]"
set -g @catppuccin_status_background "none"
# end tmp fix
set -g @catppuccin_window_number_color "#{@thm_lavender}"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_number_position "right"
set -g popup-border-style "fg=#504945"
set -g popup-border-lines "rounded"
set -g popup-style "bg=#282828,fg=#ebdbb2"

# TODO:
# set -g @plugin 'tmux-plugins/tmux-sessionist'
# set -g @sessionist-goto C-g
set -g @plugin 'sainnhe/tmux-fzf'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
# set -g @resurrect-processes ''

# TODO: does it have to be here?
set -g status-right "Save: #{continuum_status} #{E:@catppuccin_status_session}"
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'


set -g status-left ""
set -g status-right-length 100

# temporary fix, see catppuccin/tmux/issues/409
set -g window-status-format "#[bg=default,fg=#313244]#[bg=default,fg=#313244]#[bg=#313244,fg=#cdd6f4]#W#[bg=#313244,fg=#313244]█#[bg=#b4befe,fg=#b4befe]█#[bg=#b4befe,fg=#11111b]#I#[bg=default,fg=#b4befe]#[bg=default,fg=#b4befe]"

